<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inasistencias</title>
    <style>
        /* Estilos base: Fondo oscuro y ambiente inmersivo */
        body {
            background-color: #0d0d12;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Contenedor del formulario con toques de neón */
        .form-container {
            background: #1a1a24;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2), 0 0 40px rgba(184, 41, 237, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #b3b3b3;
        }

        /* Estilos de los inputs y el cuadro de texto */
        input[type="text"],
        input[type="email"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background-color: #09090c;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Estilo específico para que el textarea no se rompa visualmente */
        textarea {
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #b829ed;
            box-shadow: 0 0 8px rgba(184, 41, 237, 0.5);
        }

        /* Botón de envío luminoso */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(90deg, #00d4ff, #b829ed);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.6), 0 0 25px rgba(184, 41, 237, 0.6);
        }

        #statusMessage {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Registro de Inasistencia</h2>
        <form id="justificationForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="form-group">
                <label for="dni">DNI </label>
                <input type="number" id="dni" name="dni" required>
            </div>

             <div class="form-group">
                <label for="fecha">fecha de Inasistencia</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required>
            </div>

            <div class="form-group">
                <label for="motivo">Motivo de Inasistencia (Explicación detallada)</label>
                <textarea id="motivo" name="motivo" placeholder="Escribe aquí los motivos de tu falta..." required></textarea>
            </div>

            <div class="form-group">
                <label for="archivo">Documento o Imagen de Soporte</label>
                <input type="file" id="archivo" name="archivo" accept=".pdf, .jpg, .jpeg, .png" required>
            </div>

            <button type="submit">Enviar Justificación</button>
        </form>
        <div id="statusMessage"></div>
    </div>

    <script src="/app.js" defer></script>
</body>
</html>
